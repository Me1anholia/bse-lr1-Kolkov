<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Активні завдання</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .task-list {
            background: white;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: #f5f5f5;
            border-color: #667eea;
            box-shadow: 0 2px 4px rgba(102, 126, 234, 0.1);
        }

        .task-item.completed {
            opacity: 0.7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            color: #333;
            font-size: 15px;
            margin-bottom: 5px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #999;
        }

        .priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 12px;
        }

        .priority.high {
            background: #fee;
            color: #c33;
        }

        .priority.medium {
            background: #fef3cd;
            color: #856404;
        }

        .priority.low {
            background: #d4edda;
            color: #155724;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .footer {
            background: white;
            padding: 20px 25px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Активні завдання</h1>
            <p id="taskCount">Всього завдань: 0</p>
        </div>

        <div class="task-list" id="taskList"></div>

        <div class="footer">
            Натисніть на завдання, щоб позначити його як завершене
        </div>
    </div>

    <script>
        const taskList = document.getElementById('taskList');
        const taskCount = document.getElementById('taskCount');

        const tasks = [
            { id: 1, text: 'Завершити проект веб-додатку', date: '2024-01-15', priority: 'high', completed: false },
            { id: 2, text: 'Переглянути код команди', date: '2024-01-16', priority: 'medium', completed: false },
            { id: 3, text: 'Написати документацію', date: '2024-01-17', priority: 'medium', completed: false },
            { id: 4, text: 'Провести тестування', date: '2024-01-18', priority: 'high', completed: false },
            { id: 5, text: 'Оновити залежності проекту', date: '2024-01-19', priority: 'low', completed: false }
        ];

        function renderTasks() {
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <p>✓ Усі завдання завершені! Хорошої роботи!</p>
                    </div>
                `;
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <div class="task-text">${task.text}</div>
                        <div class="task-meta">
                            <span>📅 ${task.date}</span>
                            <span class="priority ${task.priority}">
                                ${task.priority === 'high' ? '🔴 Висока' : 
                                  task.priority === 'medium' ? '🟡 Середня' : '🟢 Низька'}
                            </span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
                </div>
            `).join('');

            updateTaskCount();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) task.completed = !task.completed;
            renderTasks();
        }

        function deleteTask(id) {
            const index = tasks.findIndex(t => t.id === id);
            if (index > -1) tasks.splice(index, 1);
            renderTasks();
        }

        function updateTaskCount() {
            const active = tasks.filter(t => !t.completed).length;
            taskCount.textContent = `Активних завдань: ${active}`;
        }

        renderTasks();
    </script>
</body>
</html>
